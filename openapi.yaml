openapi: 3.0.0
info:
  title: Skill Collection API
  description: API for managing skills, user authentication, and skill verifications
  version: 1.0.0
  contact:
    name: API Support
servers:
  - url: http://localhost:8080/api
    description: Development server
  - url: https://api.skillcollection.com/api
    description: Production server
tags:
  - name: Auth
    description: Authentication endpoints
  - name: Users
    description: User management endpoints
  - name: Skills
    description: Skill management endpoints
  - name: Verifications
    description: Skill verification endpoints
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          description: User ID
        email:
          type: string
          format: email
          description: User email address
        name:
          type: string
          description: User full name
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - email
        - name
    Skill:
      type: object
      properties:
        _id:
          type: string
          description: Skill ID
        title:
          type: string
          description: Skill title
        description:
          type: string
          description: Skill description
        category:
          type: string
          description: Skill category
        level:
          type: string
          enum:
            - beginner
            - intermediate
            - advanced
          description: Skill level
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - title
        - description
        - category
        - level
    LevelData:
      type: object
      properties:
        _id:
          type: string
          description: Level data ID
        level:
          type: string
          enum:
            - choice
            - p2p_interview
            - interview
          description: Verification level
        status:
          type: string
          enum:
            - pending
            - completed
          description: Level verification status
        verifiedBy:
          type: string
          description: ID of user who verified this level
        verifiedAt:
          type: string
          format: date-time
          description: Timestamp when level was verified
        link:
          type: string
          description: Discord meeting link (for p2p_interview and interview)
        choice:
          type: object
          properties:
            question:
              type: string
              description: Question text (for choice level)
            options:
              type: array
              items:
                type: string
              description: Answer options (for choice level)
            answer:
              type: string
              description: Correct answer (for choice level)
      required:
        - level
        - status
    Verification:
      type: object
      properties:
        _id:
          type: string
          description: Verification ID
        userId:
          type: string
          description: User ID
        skillId:
          type: string
          description: Skill ID
        levelData:
          type: array
          items:
            $ref: '#/components/schemas/LevelData'
          description: Array of verification level attempts
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - userId
        - skillId
        - levelData
    SignupRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
      required:
        - email
        - password
        - name
    SigninRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password
    AuthResponse:
      type: object
      properties:
        message:
          type: string
        token:
          type: string
          description: JWT token
        user:
          $ref: '#/components/schemas/User'
    Error:
      type: object
      properties:
        error:
          type: string
    HealthCheck:
      type: object
      properties:
        status:
          type: string
        mongodb:
          type: string
paths:
  /:
    get:
      summary: API root
      operationId: getRoot
      tags:
        - Health
      responses:
        '200':
          description: Welcome message
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags:
        - Health
      responses:
        '200':
          description: Server and database health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheck'
  /auth/signup:
    post:
      summary: Sign up a new user
      operationId: signup
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/signin:
    post:
      summary: Sign in user
      operationId: signin
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SigninRequest'
      responses:
        '200':
          description: Sign in successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/me:
    get:
      summary: Get current user profile
      operationId: getCurrentUser
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/logout:
    post:
      summary: Logout user
      operationId: logout
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
        '401':
          description: Unauthorized
  /users:
    get:
      summary: Get all users
      operationId: getAllUsers
      tags:
        - Users
      responses:
        '200':
          description: List of all users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
  /users/{id}:
    get:
      summary: Get user by ID
      operationId: getUserById
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
    patch:
      summary: Update user
      operationId: updateUser
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
    delete:
      summary: Delete user
      operationId: deleteUser
      tags:
        - Users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted
        '404':
          description: User not found
  /skills:
    post:
      summary: Create new skill
      operationId: createSkill
      tags:
        - Skills
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                category:
                  type: string
                level:
                  type: string
                  enum:
                    - beginner
                    - intermediate
                    - advanced
              required:
                - title
                - description
                - category
                - level
      responses:
        '201':
          description: Skill created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'
        '400':
          description: Validation error
    get:
      summary: Get all skills
      operationId: getAllSkills
      tags:
        - Skills
      responses:
        '200':
          description: List of all skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Skill'
  /skills/{id}:
    get:
      summary: Get skill by ID
      operationId: getSkillById
      tags:
        - Skills
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Skill details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'
        '404':
          description: Skill not found
    patch:
      summary: Update skill
      operationId: updateSkill
      tags:
        - Skills
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                category:
                  type: string
                level:
                  type: string
                  enum:
                    - beginner
                    - intermediate
                    - advanced
      responses:
        '200':
          description: Skill updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'
        '404':
          description: Skill not found
    delete:
      summary: Delete skill
      operationId: deleteSkill
      tags:
        - Skills
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Skill deleted
        '404':
          description: Skill not found
  /skills/category/{category}:
    get:
      summary: Get skills by category
      operationId: getSkillsByCategory
      tags:
        - Skills
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of skills in category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Skill'
  /verifications:
    post:
      summary: Create new verification
      operationId: createVerification
      tags:
        - Verifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                skillId:
                  type: string
                levelData:
                  type: array
                  items:
                    $ref: '#/components/schemas/LevelData'
              required:
                - userId
                - skillId
      responses:
        '201':
          description: Verification created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Verification'
        '400':
          description: Validation error
    get:
      summary: Get all verifications
      operationId: getAllVerifications
      tags:
        - Verifications
      responses:
        '200':
          description: List of all verifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Verification'
  /verifications/{id}:
    get:
      summary: Get verification by ID
      operationId: getVerificationById
      tags:
        - Verifications
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Verification details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Verification'
        '404':
          description: Verification not found
    patch:
      summary: Update verification
      operationId: updateVerification
      tags:
        - Verifications
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                levelData:
                  type: array
                  items:
                    $ref: '#/components/schemas/LevelData'
      responses:
        '200':
          description: Verification updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Verification'
        '404':
          description: Verification not found
    delete:
      summary: Delete verification
      operationId: deleteVerification
      tags:
        - Verifications
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Verification deleted
        '404':
          description: Verification not found
